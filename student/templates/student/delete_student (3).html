<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>删除学生确认</title>
    <link href="https://fastly.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">删除学生确认</h1>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="border p-4 rounded bg-light">
                    <p class="mb-4">确定要删除学生 <strong>{{ student.name }}</strong> (学号: {{ student.student_id }}) 吗？</p>
                    <p class="text-danger">此操作不可恢复！</p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">确认删除</button>
                        <a href="{% url 'student:list_student' %}" class="btn btn-secondary">取消</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://fastly.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
