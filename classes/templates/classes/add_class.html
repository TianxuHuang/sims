<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加班级</title>
    <link href="https://fastly.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">添加班级</h1>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form method="post" class="border p-4 rounded bg-light">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="name" class="form-label">班级名称</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="请输入班级名称" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">提交</button>
                </form>
                <div class="mt-3 text-center">
                    <a href="{% url 'classes:list_class' %}" class="btn btn-secondary">返回列表</a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://fastly.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
