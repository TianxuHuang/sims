<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑课程</title>
    <link href="https://fastly.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">编辑课程</h1>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="name" class="form-label">课程名称</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ course.name }}" required>
            </div>
            <div class="mb-3">
                <label for="credits" class="form-label">学分</label>
                <input type="number" class="form-control" id="credits" name="credits" value="{{ course.credits }}" required>
            </div>
            <div class="mb-3">
                <label for="hours" class="form-label">课时</label>
                <input type="number" class="form-control" id="hours" name="hours" value="{{ course.hours }}" required>
            </div>
            <div class="mb-3">
                <label for="description" class="form-label">课程描述</label>
                <textarea class="form-control" id="description" name="description" rows="3">{{ course.description }}</textarea>
            </div>
            <button type="submit" class="btn btn-success">保存</button>
            <a href="{% url 'course:list_course' %}" class="btn btn-secondary">返回</a>
        </form>
    </div>
    <script src="https://fastly.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
